<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BIST Ultimate Terminal v3.8</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#05070a;--surface:#0d1117;--accent:#00e5ff;--green:#00ff88;--red:#ff3860;--gold:#ffd700;--text:#e0e8f0;--muted:#5a6a7a}
        body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;padding:10px;margin:0;display:flex;flex-direction:column;align-items:center}
        .header{width:92%;background:rgba(13,17,23,0.9);padding:15px;border-radius:15px;border:1px solid var(--accent);text-align:center;margin-top:10px;margin-bottom:10px}
        .pool-stats{width:92%; background:rgba(0,229,255,0.05); border:1px solid #222; border-radius:12px; padding:10px; margin-bottom:10px; display:flex; justify-content:space-around; font-family:'Share Tech Mono'}
        .tabs{display:flex;gap:8px;margin-bottom:15px;overflow-x:auto;width:95%;padding:5px;scrollbar-width:none}
        .tab{min-width:85px;padding:12px;background:var(--surface);border:1px solid #222;border-radius:10px;cursor:pointer;font-size:12px;text-align:center;transition:0.3s}
        .tab.active{background:var(--accent);color:black;font-weight:700;box-shadow:0 0 15px var(--accent)}
        .card{background:var(--surface);border-radius:20px;padding:20px;border:1px solid #222;width:92%;display:none;box-sizing:border-box}
        .card.active{display:block;animation:fadeIn 0.5s}
        .price-display{font-family:'Share Tech Mono';font-size:38px;color:var(--accent);margin:5px 0;text-shadow:0 0 10px rgba(0,229,255,0.3)}
        .stats-row{display:flex; justify-content:space-between; margin-bottom:10px; font-size:14px; color:var(--muted)}
        .action-sig{font-size:18px;color:var(--gold);background:rgba(255,215,0,0.05);padding:15px;border-radius:12px;text-align:center;font-weight:700;margin:15px 0;border:1px dashed var(--gold);line-height:1.5}
        .input-grid{display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:15px}
        input{width:90%;padding:10px;background:#000;border:1px solid #333;color:var(--green);font-family:'Share Tech Mono';text-align:center;border-radius:8px;margin-top:5px;font-size:14px}
        .btn{width:100%;padding:18px;border-radius:15px;border:none;font-weight:700;cursor:pointer;margin-top:10px;font-family:'Rajdhani';font-size:16px;text-transform:uppercase}
        
        /* Grafik Alanı */
        .chart-container{width:100%; height:120px; background:rgba(0,0,0,0.4); border-radius:12px; margin:10px 0; border:1px solid #222; position:relative; overflow:hidden}
        .chart-svg{width:100%; height:100%; stroke:var(--green); stroke-width:3; fill:none; filter: drop-shadow(0 0 5px var(--green))}
        .chart-fill{fill: url(#grad); stroke: none; opacity: 0.2}

        @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>

<div class="header">
    <div style="font-size:10px;color:var(--muted);letter-spacing:2px">BIST ULTIMATE TERMINAL v3.8</div>
    <div id="status" style="font-size:18px;font-family:'Share Tech Mono';color:var(--green)">SİSTEM HAZIR</div>
</div>

<div class="pool-stats">
    <div style="text-align:center"><small>NAKİT DEPO</small><br><span id="total-pool" style="color:var(--gold)">0 TL</span></div>
    <div style="text-align:center"><small>TOPLAM PORTFÖY</small><br><span id="total-val" style="color:var(--accent)">0 TL</span></div>
</div>

<div class="tabs" id="tab-list">
    <div class="tab active" onclick="showTab(0)">Z30EA</div>
    <div class="tab" onclick="showTab(1)">Teknoloji</div>
    <div class="tab" onclick="showTab(2)">Banka</div>
    <div class="tab" onclick="showTab(3)">Gayrimenkul</div>
    <div class="tab" onclick="showTab(4)">Altın Depo</div>
    <div class="tab" onclick="showTab(5)">Nakit Depo</div>
</div>

<div id="p-container" style="width:100%; display:flex; justify-content:center;"></div>

<button class="btn" style="background:var(--accent);color:black;margin-top:15px;margin-bottom:40px;width:92%" onclick="updateAll()">GÜNCEL VERİLERİ ÇEK</button>

<script>
    const config = [
        { id: 0, name: "Z30EA.IS", label: "BIST 30", isReserve: false, mult: 1.2, history: [100, 105, 102, 110] },
        { id: 1, name: "ZPT10.IS", label: "Teknoloji", isReserve: false, mult: 1.2, history: [100] },
        { id: 2, name: "ZPLIB.IS", label: "Banka", isReserve: false, mult: 1.2, history: [100] },
        { id: 3, name: "OPTGY.IS", label: "Gayrimenkul", isReserve: false, mult: 1.2, history: [100] },
        { id: 4, name: "GLDTR.IS", label: "Altın Depo", isReserve: true, mult: 1.2, history: [100] },
        { id: 5, name: "NPTLR.IS", label: "Nakit Depo", isReserve: true, mult: 1.2, history: [100] }
    ];

    let prices = {};

    function init() {
        const container = document.getElementById('p-container');
        config.forEach(p => {
            container.innerHTML += `
                <div id="card${p.id}" class="card ${p.id === 0 ? 'active' : ''}">
                    <div class="stats-row">
                        <span>${p.label} ${p.isReserve ? '(DEPO)' : ''}</span>
                        <span id="pl${p.id}" style="font-weight:700">K/Z: %0</span>
                    </div>
                    <div class="price-display" id="price${p.id}">---</div>
                    <div id="total-row${p.id}" style="color:var(--muted); font-size:12px; margin-bottom:10px">Pozisyon Değeri: 0 TL</div>
                    
                    <div class="input-grid">
                        <div><small>ELDEKİ LOT</small><br><input type="number" id="lot${p.id}" value="0" onchange="calculate()"></div>
                        <div><small>MALİYET (TL)</small><br><input type="number" id="cost${p.id}" value="0" onchange="calculate()"></div>
                    </div>

                    <div id="action${p.id}" class="action-sig">DENGELENİYOR...</div>

                    <div style="margin-top:10px">
                        <small style="color:var(--muted)">ADET BİRİKİMİ (SNOWBALL CHART)</small>
                        <div class="chart-container" id="chart-container-${p.id}">
                            <svg class="chart-svg" id="svg-${p.id}" viewBox="0 0 100 100" preserveAspectRatio="none">
                                <defs>
                                    <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                        <stop offset="0%" style="stop-color:var(--green);stop-opacity:1" />
                                        <stop offset="100%" style="stop-color:var(--green);stop-opacity:0" />
                                    </linearGradient>
                                </defs>
                                <path class="chart-fill" d="" id="fill-${p.id}"></path>
                                <path d="" id="path-${p.id}"></path>
                            </svg>
                        </div>
                    </div>

                    <button class="btn" style="background:var(--green);color:black;margin-top:20px" onclick="tradeExecuted(${p.id})">İŞLEMİ KAYDET (SNOWBALL)</button>
                </div>
            `;
            renderChart(p.id);
        });
        load();
    }

    function showTab(idx) {
        document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
        document.querySelectorAll('.card').forEach((c, i) => c.classList.toggle('active', i === idx));
    }

    async function updateAll() {
        const statusEl = document.getElementById('status');
        statusEl.innerText = "YÜKLENİYOR...";
        for(let p of config) {
            try {
                const res = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/'+p.name+'?interval=1d&range=20d')}`);
                const data = await res.json();
                const currentPrice = data.chart.result[0].meta.regularMarketPrice;
                prices[p.id] = currentPrice;
                const quotes = data.chart.result[0].indicators.quote[0];
                let tr = 0; let validDays = 0;
                for(let i=quotes.close.length-1; i >= 0 && validDays < 14; i--) {
                    if(quotes.high[i] && quotes.low[i]) { tr += (quotes.high[i] - quotes.low[i]); validDays++; }
                }
                const atr = (tr / validDays) * p.mult;
                document.getElementById(`price${p.id}`).innerText = currentPrice.toFixed(2);
            } catch(e) { console.error(p.name + " hatası"); }
        }
        statusEl.innerText = "PİYASA GÜNCEL";
        calculate();
    }

    function calculate() {
        let totalReserveTL = 0;
        let totalPortfolioTL = 0;
        let reserves = [];

        config.forEach(p => {
            const lot = parseFloat(document.getElementById(`lot${p.id}`).value) || 0;
            const price = prices[p.id] || 0;
            const val = lot * price;
            totalPortfolioTL += val;
            if(p.isReserve) {
                totalReserveTL += val;
                reserves.push({ id: p.id, label: p.label, price: price, val: val });
            }
            document.getElementById(`total-row${p.id}`).innerText = `Pozisyon Değeri: ${Math.round(val).toLocaleString()} TL`;
        });

        document.getElementById('total-pool').innerText = Math.round(totalReserveTL).toLocaleString() + " TL";
        document.getElementById('total-val').innerText = Math.round(totalPortfolioTL).toLocaleString() + " TL";

        config.forEach(p => {
            const price = prices[p.id] || 0;
            const sig = document.getElementById(`action${p.id}`);
            if(p.isReserve) { sig.innerHTML = "DEPO VARLIĞI"; return; }
            
            const lot = parseFloat(document.getElementById(`lot${p.id}`).value) || 0;
            const targetValFromPool = totalReserveTL / 4; 
            const diffTL = targetValFromPool - (lot * price);
            const pending = Math.round(diffTL / (price || 1));

            if(pending > 1) {
                let bestSource = reserves.reduce((prev, curr) => (prev.val > curr.val) ? prev : curr);
                const sellLot = Math.ceil((pending * price) / bestSource.price);
                sig.innerHTML = `ALIM VAKTİ: <span style="color:var(--green)">+${pending} ADET</span><br><small>👉 ${sellLot} adet ${bestSource.label} SAT</small>`; 
            } else if(pending < -1) {
                let bestTarget = reserves.reduce((prev, curr) => (prev.val < curr.val) ? prev : curr);
                const buyLot = Math.floor((Math.abs(pending) * price) / bestTarget.price);
                sig.innerHTML = `SATIŞ VAKTİ: <span style="color:var(--red)">${Math.abs(pending)} ADET</span><br><small>👉 ${buyLot} adet ${bestTarget.label} AL</small>`; 
            } else { sig.innerHTML = "DURUM: DENGELİ"; }
        });
        save();
    }

    function tradeExecuted(id) {
        const lotVal = parseFloat(document.getElementById(`lot${id}`).value);
        config[id].history.push(lotVal);
        if(config[id].history.length > 20) config[id].history.shift();
        renderChart(id);
        save();
    }

    function renderChart(id) {
        const path = document.getElementById(`path-${id}`);
        const fill = document.getElementById(`fill-${id}`);
        const history = config[id].history;
        if(history.length < 2) return;

        const max = Math.max(...history);
        const min = Math.min(...history);
        const range = max - min || 1;
        const stepX = 100 / (history.length - 1);

        let d = `M 0 ${100 - ((history[0] - min) / range * 80 + 10)}`;
        for(let i = 1; i < history.length; i++) {
            const y = 100 - ((history[i] - min) / range * 80 + 10);
            d += ` L ${i * stepX} ${y}`;
        }
        path.setAttribute('d', d);
        fill.setAttribute('d', d + ` L 100 100 L 0 100 Z`);
    }

    function save() {
        const data = {};
        config.forEach(p => {
            data[`lot${p.id}`] = document.getElementById(`lot${p.id}`).value;
            data[`cost${p.id}`] = document.getElementById(`cost${p.id}`).value;
            data[`h${p.id}`] = p.history;
        });
        localStorage.setItem('bist_ultimate_v38', JSON.stringify(data));
    }

    function load() {
        const saved = JSON.parse(localStorage.getItem('bist_ultimate_v38'));
        if(saved) {
            config.forEach(p => {
                if(saved[`lot${p.id}`]) document.getElementById(`lot${p.id}`).value = saved[`lot${p.id}`];
                if(saved[`cost${p.id}`]) document.getElementById(`cost${p.id}`).value = saved[`cost${p.id}`];
                if(saved[`h${p.id}`]) { p.history = saved[`h${p.id}`]; renderChart(p.id); }
            });
        }
    }
    window.onload = init;
</script>
</body>
</html>
