<script>
    // ... (Üst kısımdaki config ve init aynı kalıyor)

    function calculate() {
        let totalReserveTL = 0;
        let totalPortfolioTL = 0;
        let reserves = [];

        // 1. Önce Portföy Değerlerini ve Depoyu Hesapla
        config.forEach(p => {
            const lot = parseFloat(document.getElementById(`lot${p.id}`).value) || 0;
            const cost = parseFloat(document.getElementById(`cost${p.id}`).value) || 0;
            const price = prices[p.id] || 0;
            const val = lot * price;
            
            totalPortfolioTL += val;
            if(p.isReserve) {
                totalReserveTL += val;
                reserves.push({ id: p.id, label: p.label, price: price, lot: lot });
            }

            // K/Z ve Pozisyon Değeri
            if(cost > 0 && price > 0) {
                const plPercent = ((price - cost) / cost) * 100;
                const plEl = document.getElementById(`pl${p.id}`);
                plEl.innerText = `K/Z: %${plPercent.toFixed(1)}`;
                plEl.style.color = plPercent >= 0 ? 'var(--green)' : 'var(--red)';
            }
            document.getElementById(`total-row${p.id}`).innerText = `Pozisyon Değeri: ${Math.round(val).toLocaleString()} TL`;
        });

        document.getElementById('total-pool').innerText = Math.round(totalReserveTL).toLocaleString() + " TL";
        document.getElementById('total-val').innerText = Math.round(totalPortfolioTL).toLocaleString() + " TL";

        // 2. Her Varlık İçin Aksiyon ve KAYNAK Belirle
        config.forEach(p => {
            if(p.isReserve) return;
            const lot = parseFloat(document.getElementById(`lot${p.id}`).value) || 0;
            const price = prices[p.id] || 0;
            const assetVal = lot * price;
            const targetValFromPool = totalReserveTL / 4; 
            const diffTL = targetValFromPool - assetVal;
            const pending = Math.round(diffTL / (price || 1));

            const sig = document.getElementById(`action${p.id}`);
            
            if(pending > 1) { // ALIM SİNYALİ
                const costTL = pending * price;
                // Kaynak Önerisi (NPTLR ve GLDTR bazında)
                let sourceTips = reserves.map(r => {
                    const sellLot = Math.ceil(costTL / (r.price || 1));
                    return `<br><small>👉 ${sellLot} adet ${r.label} SAT</small>`;
                }).join("");
                
                sig.innerHTML = `ALIM VAKTİ: <span style="color:var(--green)">+${pending} ADET</span>${sourceTips}`; 
            } 
            else if(pending < -1) { // SATIŞ SİNYALİ
                const gainTL = Math.abs(pending) * price;
                let targetTips = reserves.map(r => {
                    const buyLot = Math.floor(gainTL / (r.price || 1));
                    return `<br><small>👉 ${buyLot} adet ${r.label} AL</small>`;
                }).join("");

                sig.innerHTML = `SATIŞ VAKTİ: <span style="color:var(--red)">${Math.abs(pending)} ADET</span>${targetTips}`; 
            } 
            else { 
                sig.innerHTML = "DURUM: DENGELİ"; 
            }
        });
        save();
    }
    // ... (Geri kalan save/load/init fonksiyonları v3.5 ile aynı)
</script>
